name: Build Fusion Browser

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Show Qt path
        shell: pwsh
        run: |
          Write-Host "Qt6_DIR=$env:Qt6_DIR"
          Write-Host "QT_ROOT_DIR=$env:QT_ROOT_DIR"
          Get-ChildItem "C:\Qt" -ErrorAction SilentlyContinue | Select-Object Name

      - name: Find Qt prefix
        id: qtpath
        shell: pwsh
        run: |
          $qt = Get-ChildItem "C:\Qt" -Directory | Where-Object { $_.Name -match "^6\." } | Select-Object -First 1
          if ($qt) {
            $kit = Get-ChildItem "$($qt.FullName)" -Directory | Where-Object { $_.Name -match "msvc" } | Select-Object -First 1
            Write-Host "Found Qt kit: $($kit.FullName)"
            echo "QTPREFIX=$($kit.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Falling back to Qt6_DIR: $env:Qt6_DIR"
            echo "QTPREFIX=$env:Qt6_DIR" >> $env:GITHUB_OUTPUT
          }

      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=${{ steps.qtpath.outputs.QTPREFIX }}"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Prepare dist
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "Fusion.exe" | Select-Object -First 1
          if (-not $exe) { throw "Fusion.exe not found!" }
          Write-Host "Exe: $($exe.FullName)"
          New-Item -ItemType Directory -Force -Path "dist\Fusion" | Out-Null
          Copy-Item $exe.FullName "dist\Fusion\Fusion.exe"
          if (Test-Path "resources\fusion.ico") {
            Copy-Item "resources\fusion.ico" "dist\Fusion\"
          }

      - name: windeployqt
        shell: pwsh
        run: |
          $prefix = "${{ steps.qtpath.outputs.QTPREFIX }}"
          $wdq = "$prefix\bin\windeployqt.exe"
          & $wdq --release --webengine "dist\Fusion\Fusion.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-Browser-Windows
          path: dist\Fusion\
          retention-days: 30
