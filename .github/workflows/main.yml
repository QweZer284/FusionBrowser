name: Build Fusion Browser

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Apply source patches
        shell: pwsh
        run: python FusionBrowser/fix_sources.py

      - name: Create placeholder fusion.ico
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "FusionBrowser\resources" | Out-Null
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(32, 32)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.Clear([System.Drawing.Color]::FromArgb(10, 122, 255))
          $g.Dispose()
          $ico = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
          $stream = [System.IO.File]::OpenWrite("FusionBrowser\resources\fusion.ico")
          $ico.Save($stream)
          $stream.Close()
          $bmp.Dispose()
          Write-Host "Done: $(Test-Path 'FusionBrowser\resources\fusion.ico')"

      - name: Configure CMake
        shell: pwsh
        run: cmake -S FusionBrowser -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=$env:Qt6_DIR"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel 4

      - name: Prepare dist
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "Fusion.exe" | Select-Object -First 1
          if (-not $exe) { throw "Fusion.exe not found!" }
          Write-Host "Found: $($exe.FullName)"
          New-Item -ItemType Directory -Force -Path "dist\Fusion" | Out-Null
          Copy-Item $exe.FullName "dist\Fusion\Fusion.exe"
          Copy-Item "FusionBrowser\resources\fusion.ico" "dist\Fusion\" -ErrorAction SilentlyContinue
          & "$env:Qt6_DIR\bin\windeployqt.exe" --release --webengine "dist\Fusion\Fusion.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-Browser-Windows
          path: dist\Fusion\
          retention-days: 30
